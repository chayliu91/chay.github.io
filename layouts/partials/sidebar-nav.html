<!-- layouts/partials/sidebar-nav.html -->
<aside class="sidebar-nav">
  <h3>导航菜单</h3>
  <ul class="nav-tree">
    {{ range site.Data.sidebar }}
    <li class="nav-item">
      {{ if .subitems }}
        <!-- 有子菜单：显示为可折叠项 -->
        <div class="nav-group-title" onclick="toggleNav(this)">
          <span>{{ .name }}</span>
          <span class="arrow">▼</span>
        </div>
        <ul class="nav-subitems" style="display: none;">
          {{ range .subitems }}
          <li><a href="{{ .url }}">{{ .name }}</a></li>
          {{ end }}
        </ul>
      {{ else }}
        <!-- 无子菜单：直接链接 -->
        <a href="{{ .url }}" class="nav-link">{{ .name }}</a>
      {{ end }}
    </li>
    {{ end }}
  </ul>
</aside>

<script>
  function toggleNav(element) {
    var subItems = element.nextElementSibling;
    var arrow = element.querySelector('.arrow');
    if (subItems.style.display === "none") {
      subItems.style.display = "block";
      arrow.innerHTML = "▲";
    } else {
      subItems.style.display = "none";
      arrow.innerHTML = "▼";
    }
  }
</script>

<style>
  .sidebar-nav {
    position: fixed;
    left: 0;
    top: 60px; /* 根据你头部高度调整 */
    width: 250px;
    height: calc(100vh - 60px);
    overflow-y: auto;
    padding: 20px;
    border-right: 1px solid #eee;
    background: #fff;
    z-index: 100;
  }
  .nav-tree { list-style: none; padding: 0; }
  .nav-item { margin-bottom: 10px; }
  .nav-group-title {
    cursor: pointer;
    font-weight: bold;
    display: flex;
    justify-content: space-between;
    padding: 5px 0;
  }
  .nav-subitems {
    list-style: none;
    padding-left: 20px;
    margin-top: 5px;
  }
  .nav-subitems a {
    text-decoration: none;
    color: #666;
    font-size: 0.9em;
    display: block;
    padding: 3px 0;
  }
  .nav-subitems a:hover { color: #000; }
  
  /* 移动端隐藏侧边栏，或改为汉堡菜单 */
  @media (max-width: 768px) {
    .sidebar-nav { display: none; }
  }
  
  /* 主内容向右偏移，防止被遮挡 */
  @media (min-width: 769px) {
    .main-wrapper { margin-left: 250px; } 
    /* 注意：PaperMod 的主容器类名可能是 .main, .container 或 #main，需 inspect 确认 */
  }
</style>
